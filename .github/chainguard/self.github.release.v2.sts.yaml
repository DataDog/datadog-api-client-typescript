---
# Policy for: .github/workflows/release.yml in DataDog/datadog-api-client-typescript (v2 branch)
# Allows the release workflow to create tags and GitHub releases
issuer: https://token.actions.githubusercontent.com
subject: repo:DataDog/datadog-api-client-typescript:pull_request

claim_pattern:
  event_name: pull_request
  job_workflow_ref: DataDog/datadog-api-client-typescript/\.github/workflows/release\.yml@refs/pull/[0-9]+/merge
  repository: DataDog/datadog-api-client-typescript

permissions:
  contents: write
